namespace MasterPol.Pages
{
    public partial class AddEditPage : Page
    {
        private PartnersImport _currentpartner;
        private bool FlagAddorEdit;

        public AddEditPage(PartnersImport partners)
        {
            InitializeComponent();
            _currentpartner = partners;
            FlagAddorEdit = _currentpartner == null;
            Init();
        }

        public void Init()
        {
            IdTextBox.Visibility = Visibility.Hidden;
            IdLabel.Visibility = Visibility.Hidden;
            TypeComboBox.ItemsSource = Data.MasterPolEntities.GetContext().TypePartner.ToList();

            if (_currentpartner != null)
            {
                NamePartnerTextBox.Text = _currentpartner.Partners.NamePartner;
                RatingTextBox.Text = _currentpartner.Rating.ToString();
                AddressTextBox.Text = _currentpartner.IdAddress.ToString();
                DirectorNameTextBox.Text = _currentpartner.Director.DirectorName;
                PhoneTextBox.Text = _currentpartner.Phone;
                EmailTextBox.Text = _currentpartner.Email;
                IdTextBox.Text = _currentpartner.IdPartnersImport.ToString();
                TypeComboBox.SelectedItem = Data.MasterPolEntities.GetContext().TypePartner
                    .FirstOrDefault(d => d.IdTypePartner == _currentpartner.IdTypePartner);
            }
        }

        private void BackButton_Click(object sender, RoutedEventArgs e)
        {
            Classes.Manager.MainFrame.Navigate(new Pages.ListViewPage());
        }

        private void SaveButton_Click(object sender, RoutedEventArgs e)
        {
            try
            {
                StringBuilder errors = new StringBuilder();
                if (string.IsNullOrEmpty(NamePartnerTextBox.Text))
                    errors.AppendLine("Заполните наименование!");
                if (TypeComboBox.SelectedItem == null)
                    errors.AppendLine("Выберите тип партнера!");
                if (string.IsNullOrEmpty(RatingTextBox.Text))
                    errors.AppendLine("Заполните рейтинг!");
                if (string.IsNullOrEmpty(AddressTextBox.Text))
                    errors.AppendLine("Заполните адрес!");
                if (string.IsNullOrEmpty(DirectorNameTextBox.Text))
                    errors.AppendLine("Заполните ФИО!");
                if (string.IsNullOrEmpty(PhoneTextBox.Text))
                    errors.AppendLine("Заполните номер телефона!");
                if (string.IsNullOrEmpty(EmailTextBox.Text))
                    errors.AppendLine("Заполните Email!");

                if (errors.Length > 0)
                {
                    MessageBox.Show(errors.ToString(), "Ошибка!", MessageBoxButton.OK, MessageBoxImage.Error);
                    return;
                }

                var selectedCategory = TypeComboBox.SelectedItem as Data.TypePartner;
                if (selectedCategory == null)
                {
                    MessageBox.Show("Выберите тип партнера!", "Ошибка!", MessageBoxButton.OK, MessageBoxImage.Error);
                    return;
                }

                var context = Data.MasterPolEntities.GetContext();

                if (!FlagAddorEdit)
                {
                    _currentpartner.IdTypePartner = selectedCategory.IdTypePartner;
                    _currentpartner.Rating = Convert.ToInt32(RatingTextBox.Text);
                    _currentpartner.Phone = PhoneTextBox.Text;
                    _currentpartner.Email = EmailTextBox.Text;
                    _currentpartner.IdAddress = Convert.ToInt32(AddressTextBox.Text);

                    var searchDirector = context.Director
                        .FirstOrDefault(item => item.IdDerector == _currentpartner.IdPartnersImport);
                    if (searchDirector != null)
                    {
                        searchDirector.DirectorName = DirectorNameTextBox.Text;
                    }

                    var searchNamePartner = context.Partners
                        .FirstOrDefault(item => item.IdNamePartner == _currentpartner.IdNamePartner);
                    if (searchNamePartner != null)
                    {
                        searchNamePartner.NamePartner = NamePartnerTextBox.Text;
                    }

                    MessageBox.Show("Успешно изменено!", "Успех!", MessageBoxButton.OK, MessageBoxImage.Information);
                }
                else
                {
                    int rating;
                    if (!int.TryParse(RatingTextBox.Text, out rating) || rating < 0)
                    {
                        MessageBox.Show("Рейтинг должен быть целым неотрицательным числом.", "Ошибка", MessageBoxButton.OK, MessageBoxImage.Error);
                        return;
                    }

                    var newPartner = new Data.PartnersImport
                    {
                        IdTypePartner = selectedCategory.IdTypePartner,
                        Rating = rating,
                        IdAddress = Convert.ToInt32(AddressTextBox.Text),
                        Phone = PhoneTextBox.Text,
                        Email = EmailTextBox.Text
                    };

                    var searchDirector = context.Director
                        .FirstOrDefault(item => item.DirectorName == DirectorNameTextBox.Text);
                    if (searchDirector != null)
                    {
                        newPartner.IdDerector = searchDirector.IdDerector;
                    }
                    else
                    {
                        var director = new Data.Director
                        {
                            DirectorName = DirectorNameTextBox.Text
                        };
                        context.Director.Add(director);
                        context.SaveChanges();
                        newPartner.IdDerector = director.IdDerector;
                    }

                    var searchNamePartner = context.Partners
                        .FirstOrDefault(item => item.NamePartner == NamePartnerTextBox.Text);
                    if (searchNamePartner != null)
                    {
                        newPartner.IdNamePartner = searchNamePartner.IdNamePartner;
                    }
                    else
                    {
                        var namePartner = new Data.Partners
                        {
                            NamePartner = NamePartnerTextBox.Text
                        };
                        context.Partners.Add(namePartner);
                        context.SaveChanges();
                        newPartner.IdNamePartner = namePartner.IdNamePartner;
                    }

                    context.PartnersImport.Add(newPartner);
                    MessageBox.Show("Успешно добавлено!", "Успех!", MessageBoxButton.OK, MessageBoxImage.Information);
                }

                context.SaveChanges();
            }
            catch (Exception ex)
            {
                MessageBox.Show($"Произошла ошибка: {ex.Message}", "Ошибка!", MessageBoxButton.OK, MessageBoxImage.Error);
            }
        }

    }
}


<Page x:Class="MasterPol.Pages.HistoryPage"
      xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation"
      xmlns:x="http://schemas.microsoft.com/winfx/2006/xaml"
      xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006" 
      xmlns:d="http://schemas.microsoft.com/expression/blend/2008" 
      xmlns:local="clr-namespace:MasterPol.Pages"
      mc:Ignorable="d" 
      d:DesignHeight="650" d:DesignWidth="1000"
      Title="HistoryPage"
      Background="White">

    <Grid>
        <Grid.RowDefinitions>
            <RowDefinition Height="*"></RowDefinition>
            <RowDefinition Height="70"></RowDefinition>
        </Grid.RowDefinitions>
        <DataGrid x:Name="HistoryDataGrid" Grid.Row="0"
                  AutoGenerateColumns="False"
                  CanUserAddRows="False"
                  CanUserDeleteRows="False"
                  HorizontalAlignment="Center"
                  VerticalAlignment="Center">
            <DataGrid.Columns>
                <DataGridTextColumn Header="Наименование"
                    Binding="{Binding Products.NameProducts}"></DataGridTextColumn>
                <DataGridTextColumn Header="Количество продукции"
                    Binding="{Binding QuantityProducts}"></DataGridTextColumn>
                <DataGridTextColumn Header="Дата продажи"
                    Binding="{Binding DateOfSale, StringFormat='{}{0:yyyy-MM-dd}'}"></DataGridTextColumn>

            </DataGrid.Columns>
        </DataGrid>

        <Button x:Name="BackButton" Grid.Row="1"
        Content="Назад" HorizontalAlignment="Center"
        Click="BackButton_Click"></Button>
    </Grid>
</Page>


