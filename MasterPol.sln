using System;
using System.Collections.Generic;
using System.Linq;
using System.Text;
using System.Threading.Tasks;
using System.Windows;
using System.Windows.Controls;
using System.Windows.Data;
using System.Windows.Documents;
using System.Windows.Input;
using System.Windows.Markup;
using System.Windows.Media;
using System.Windows.Media.Imaging;
using System.Windows.Navigation;
using System.Windows.Shapes;

namespace MasterPol.Pages
{
    /// <summary>
    /// Логика взаимодействия для ListViewPage.xaml
    /// </summary>
    public partial class ListViewPage : Page
    {
        public ListViewPage()
        {
            InitializeComponent();
            LoadData();
        }

        private void LoadData()
        {
            var partners = Data.MasterPolEntities.GetContext().PartnersImport.ToList();

            var parterDiscounts = (from partner in partners
                                   join product in Data.MasterPolEntities.GetContext().PartnerProductsImport
                                   on partner.IdPartnersImport equals product.IdNamePartner
                                   group product by partner into g
                                   select new
                                   {
                                       Partner = g.Key,
                                       Discount = CalculateDiscount(g.Sum(partnerDiscounts => partnerDiscounts.QuantityProducts))
                                       // Discount = CalculateDiscount(g.Sum(partnerDiscounts => partnerDiscounts.QuantityProducts))
                                   }).ToList();
            MasterListView.ItemsSource = parterDiscounts;
        }

        private int CalculateDiscount(int totalCount)
        {
            if (totalCount < 10000) return 0;
            if (totalCount >= 10000 && totalCount < 50000) return 5;
            if (totalCount >= 50000 && totalCount < 300000) return 10;
            return 15;
        }

        private void EditButton_Click(object sender, RoutedEventArgs e )
        {
           Classes.Manager.MainFrame.Navigate(new Pages.AddEditPage(null));
        }

        private void AddButton_Click(object sender, RoutedEventArgs e )
        {
            Classes.Manager.MainFrame.Navigate(new Pages.AddEditPage(null));
        }

        private void HistoryButton_Click( object sender, RoutedEventArgs e )
        {
                Classes.Manager.MainFrame.Navigate(new HistoryPage(null));
        }

        private void ASddButton_Click(object sender, RoutedEventArgs e)
        {
            Classes.Manager.MainFrame.Navigate(new Pages.AddEditPage(null));
        }
    }
}



