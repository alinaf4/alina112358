using System;
using System.Collections.Generic;
using System.Linq;
using System.Text;
using System.Threading.Tasks;
using System.Windows;
using System.Windows.Controls;
using System.Windows.Data;
using System.Windows.Documents;
using System.Windows.Input;
using System.Windows.Markup;
using System.Windows.Media;
using System.Windows.Media.Imaging;
using System.Windows.Navigation;
using System.Windows.Shapes;

namespace MasterPol.Pages
{
    /// <summary>
    /// Логика взаимодействия для HistoryPage.xaml
    /// </summary>
    public partial class HistoryPage : Page
    {
        private readonly Data.PartnersImport _selectedPartner;

        public HistoryPage(Data.PartnersImport selectedPartner)
        {
            InitializeComponent();
            _selectedPartner = selectedPartner;

            LoadHistory();
        }

        private void LoadHistory()
        {
            var history = Data.MasterPolEntities.GetContext().PartnerProductsImport
                .Where(p => p.IdNamePartner == _selectedPartner.IdNamePartner)
                .Select(p => new
                {
                    Products = p.Products,
                    QuantityProducts = p.QuantityProducts,
                    DataOfSale = p.DateOfSale
                })
                .ToList();

            HistoryDataGrid.ItemsSource = history;
        }

        private void BackButton_Click(object sender, RoutedEventArgs e)
        {
            Classes.Manager.MainFrame.Navigate(new Pages.ListViewPage());
        }
    }
}


<Page x:Class="MasterPol.Pages.ListViewPage"
      xmlns="http://schemas.microsoft.com/winfx/2006/xaml/presentation"
      xmlns:x="http://schemas.microsoft.com/winfx/2006/xaml"
      xmlns:mc="http://schemas.openxmlformats.org/markup-compatibility/2006" 
      xmlns:d="http://schemas.microsoft.com/expression/blend/2008" 
      xmlns:local="clr-namespace:MasterPol.Pages"
      mc:Ignorable="d" 
      d:DesignHeight="650" d:DesignWidth="1000"
      Title="ListViewPage"
      Background="White">

    <Grid>
        <Grid.RowDefinitions>
            <RowDefinition Height="*"></RowDefinition>
            <RowDefinition Height="70"></RowDefinition>
        </Grid.RowDefinitions>

        <ListView x:Name="MasterListView"
                  VerticalAlignment="Center"
                  HorizontalAlignment="Center"
                  Grid.Row="0">
            <ListView.ItemTemplate>
                <DataTemplate>
                    <Grid>
                        <Grid.ColumnDefinitions>
                            <ColumnDefinition Width="350"></ColumnDefinition>
                            <ColumnDefinition Width="150"></ColumnDefinition>
                            <ColumnDefinition Width="150"></ColumnDefinition>
                            <ColumnDefinition Width="*"></ColumnDefinition>
                        </Grid.ColumnDefinitions>

                        <StackPanel Grid.Column="0" VerticalAlignment="Center">
                            <TextBlock>
                                <Run Text="{Binding PartnersImport.TypePartner.TypePartner}"/>
                                <Run Text="|"/>
                                <Run Text="{Binding PartnersImport.Partners.NamePartner}"/>
                            </TextBlock>
                            <TextBlock Text="{Binding PartnersImport.Director.DirectorName, StringFormat={}Директор: {0}}"></TextBlock>
                            <TextBlock Text="{Binding PartnersImport.Phone, StringFormat={}Номер телефона: {0}}"></TextBlock>
                            <TextBlock Text="{Binding PartnersImport.Rating, StringFormat={}Рейтинг: {0}}"></TextBlock>
                        </StackPanel>

                        <TextBlock Grid.Column="1" VerticalAlignment="Center" Text="{Binding Discount, StringFormat={}Скидка: {0}%}"></TextBlock>
                        <Button x:Name="EditButton" Grid.Column="2"
                                Content="Редактировать"
                                Click="EditButton_Click"></Button>
                        <Button x:Name="HistoryButton" Grid.Column="3"
                                Content="История реализации" Margin="10"
                                Click="HistoryButton_Click"></Button>
                    </Grid>
                </DataTemplate>
            </ListView.ItemTemplate>
        </ListView>
        <Button x:Name="ASddButton" Content="Добавить"
                Click="ASddButton_Click"
                HorizontalAlignment="Center"
                Grid.Row="1"></Button>
    </Grid>
</Page>

